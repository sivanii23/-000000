<!DOCTYPE html>
<html>
<head>
  <title>Volunteer Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10">

<h1 class="text-2xl mb-4">Volunteer Signup</h1>

<input id="name" placeholder="Name" class="border p-2 m-2">
<input id="phone" placeholder="Phone" class="border p-2 m-2">

<button onclick="register()" class="bg-blue-500 text-white px-4 py-2">
  Register
</button>

<script>
async function register() {
  await fetch("/volunteer", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value
    })
  });

  alert("Registered!");
}
</script>

</body>
</html>
