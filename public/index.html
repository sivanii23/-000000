<!DOCTYPE html>
<html>
<head>
  <title>Food Rescue</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="p-6 bg-green-600 text-white text-center text-2xl">
  🍱 Food Rescue Deals Near You
</div>

<nav class="p-4 bg-white shadow flex gap-4 justify-center">
  <a href="index.html" class="px-4 py-2 rounded bg-green-100">Home</a>
  <a href="dashboard.html" class="px-4 py-2 rounded">Dashboard</a>
  <a href="restaurant.html" class="px-4 py-2 rounded">Restaurant</a>
  <a href="volunteer.html" class="px-4 py-2 rounded">Volunteer</a>
</nav>

<main class="p-6">

  <!-- Home / Listings -->
  <section id="home">
    <div id="foodList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Ads Section -->
    <div class="p-6 bg-yellow-200 text-center mt-6">
      Advertisement Space (Revenue Source)
    </div>
  </section>

  <!-- Other pages are separate files: dashboard.html, restaurant.html, volunteer.html -->

</main>

<script>
/* Home: load food listings */
async function loadFoods() {
  try {
    const res = await fetch('/foods');
    const foods = await res.json();
    const container = document.getElementById('foodList');
    container.innerHTML = '';
    foods.forEach(food => {
      container.innerHTML += `
        <div class="bg-white p-4 rounded shadow">
          <h2 class="text-xl font-bold">${food.name}</h2>
          <p>${food.restaurant}</p>
          <p>Discount: ${food.discount}%</p>
          <button class="bg-green-500 text-white px-4 py-2 mt-2 rounded">Redeem Coupon</button>
        </div>
      `;
    });
  } catch (e) {
    console.error('Failed to load foods', e);
  }
}
// Initial view
loadFoods();

</script>

</body>
</html>
