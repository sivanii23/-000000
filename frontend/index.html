<!DOCTYPE html>
<html>
<head>
  <title>Food Rescue</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-6 bg-green-600 text-white text-center text-2xl">
  🍱 Food Rescue Deals Near You
</div>

<div id="foodList" class="grid grid-cols-3 gap-4 p-6"></div>

<!-- Ads Section -->
<div class="p-6 bg-yellow-200 text-center">
  Advertisement Space (Revenue Source)
</div>

<script>
async function loadFoods() {
  const res = await fetch("/foods");
  const foods = await res.json();

  const container = document.getElementById("foodList");

  foods.forEach(food => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <h2 class="text-xl font-bold">${food.name}</h2>
        <p>${food.restaurant}</p>
        <p>Discount: ${food.discount}%</p>
        <button class="bg-green-500 text-white px-4 py-2 mt-2 rounded">
          Redeem Coupon
        </button>
      </div>
    `;
  });
}

loadFoods();
</script>

</body>
</html>
